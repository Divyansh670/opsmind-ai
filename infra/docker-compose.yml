services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: opsmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: opsmind_user
      POSTGRES_PASSWORD: opsmind_pass_dev
      POSTGRES_DB: opsmind_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5434:5432"
    volumes:
      - opsmind_pg_data:/var/lib/postgresql/data

volumes:
  opsmind_pg_data: